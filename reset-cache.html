<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>앱 캐시 초기화</title><style>body{font-family:sans-serif;padding:32px;line-height:1.6} .box{max-width:560px;margin:auto;border:1px solid #ddd;border-radius:14px;padding:24px}button{padding:12px 18px;border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:700}</style></head><body><div class="box"><h2>국제코트 앱 캐시 초기화</h2><p id="msg">기존 서비스워커와 캐시를 정리 중입니다.</p><button id="go" style="display:none" onclick="location.href='./?cache_reset=1'">앱 열기</button></div><script>(async()=>{try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches' in window){const names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));}localStorage.removeItem('tenniskj_sw_cleanup_v10_2');sessionStorage.clear();document.getElementById('msg').textContent='정리가 완료되었습니다. 아래 버튼으로 앱을 다시 여세요.';document.getElementById('go').style.display='inline-block';}catch(e){document.getElementById('msg').textContent='자동 정리 중 오류가 났습니다: '+e.message+' 브라우저를 완전히 종료한 뒤 다시 열어주세요.';document.getElementById('go').style.display='inline-block';}})();</script></body></html>
